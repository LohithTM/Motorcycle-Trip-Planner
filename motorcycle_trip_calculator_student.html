<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Motorcycle Trip Expense Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8e8e8;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }

        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: #1976d2;
            color: white;
            border: none;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background-color: #f3f3f3;
        }
    </style>
</head>

<body>

<div class="container">

<h2>🏍 Motorcycle Trip Expense Calculator</h2>

<input type="number" id="distance" placeholder="Distance (km)">
<input type="number" id="mileage" placeholder="Mileage (km/L)">
<input type="number" id="fuelPrice" placeholder="Fuel Price (₹/L)">
<input type="number" id="food" placeholder="Food Expense" value="0">
<input type="number" id="hotel" placeholder="Hotel Expense" value="0">
<input type="number" id="other" placeholder="Other Expense" value="0">

<button onclick="calculate()">Calculate</button>
<button onclick="clearFields()">Clear</button>

<div class="result">
<p id="fuelNeeded">Fuel Needed : -</p>
<p id="fuelCost">Fuel Cost : -</p>
<p id="totalExpense">Total Expense : -</p>
</div>

</div>

<script>
function calculate() {

    var distance = Number(document.getElementById("distance").value);
    var mileage = Number(document.getElementById("mileage").value);
    var fuelPrice = Number(document.getElementById("fuelPrice").value);
    var food = Number(document.getElementById("food").value) || 0;
    var hotel = Number(document.getElementById("hotel").value) || 0;
    var other = Number(document.getElementById("other").value) || 0;

    if (mileage <= 0) {
        alert("Please enter a valid mileage.");
        return;
    }

    var fuelNeeded = distance / mileage;
    var fuelCost = fuelNeeded * fuelPrice;
    var total = fuelCost + food + hotel + other;

    document.getElementById("fuelNeeded").innerHTML = "Fuel Needed : " + fuelNeeded.toFixed(2) + " L";
    document.getElementById("fuelCost").innerHTML = "Fuel Cost : ₹ " + fuelCost.toFixed(2);
    document.getElementById("totalExpense").innerHTML = "Total Expense : ₹ " + total.toFixed(2);
}

function clearFields() {
    document.getElementById("distance").value = "";
    document.getElementById("mileage").value = "";
    document.getElementById("fuelPrice").value = "";
    document.getElementById("food").value = 0;
    document.getElementById("hotel").value = 0;
    document.getElementById("other").value = 0;

    document.getElementById("fuelNeeded").innerHTML = "Fuel Needed : -";
    document.getElementById("fuelCost").innerHTML = "Fuel Cost : -";
    document.getElementById("totalExpense").innerHTML = "Total Expense : -";
}
</script>

</body>
</html>
